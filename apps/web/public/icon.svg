<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Touchline">
  <defs>
    <radialGradient id="glow" cx="0.28" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#00E08A" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#00E08A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="110" y1="300" x2="402" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EAF1F7"/>
      <stop offset="58%" stop-color="#EAF1F7"/>
      <stop offset="100%" stop-color="#2BE5FF"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.4" cy="0.36" r="0.75">
      <stop offset="0%" stop-color="#3BF0A5"/>
      <stop offset="100%" stop-color="#00E08A"/>
    </radialGradient>
  </defs>

  <!-- ground -->
  <rect width="512" height="512" rx="112" fill="#0A0E15"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- chalk touchline -->
  <line x1="110" y1="300" x2="402" y2="300" stroke="url(#line)" stroke-width="14" stroke-linecap="round"/>

  <!-- soft floodlit shadow under the ball -->
  <ellipse cx="300" cy="306" rx="46" ry="12" fill="#00E08A" opacity="0.22"/>

  <!-- the ball resting on the line, near the emerald→cyan end -->
  <circle cx="300" cy="262" r="40" fill="url(#ball)"/>
  <circle cx="300" cy="262" r="40" fill="none" stroke="#03241B" stroke-opacity="0.18" stroke-width="2"/>
</svg>
